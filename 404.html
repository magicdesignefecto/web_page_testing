<!DOCTYPE html>
<html lang="es-BO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Magic Design Efecto</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            color: #fff;
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 500px; }
        .code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        p { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.6; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Página no encontrada</h1>
        <p>La página que buscas no existe o fue movida. Regresa al inicio para explorar nuestros servicios de Revenue Operations.</p>
        <a href="index.html" class="btn">← VOLVER AL INICIO</a>
    </div>
</body>
</html>
